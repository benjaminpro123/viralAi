    }
    .grad-btn {
      background:linear-gradient(135deg,#7c3aed,#06b6d4);

    }
    .grad-btn:hover { transform:translateY(-2px); box-shadow:0 0 28px rgba(139,92,246,0.5); }

    .orb { position:absolute; border-radius:50%; filter:blur(80px); pointer-events:none; }
    .orb-violet { background:radial-gradient(circle,#7c3aed,transparent 70%); opacity:0.25; }
    .orb-cyan   { background:radial-gradient(circle,#06b6d4,transparent 70%); opacity:0.18; }

    nav a { font-family:'DM Sans',sans-serif; }
    .nav-link { position:relative; }
    .nav-link::after {
      content:''; position:absolute; bottom:-2px; left:0; width:0; height:2px;
      background:linear-gradient(90deg,#a78bfa,#22d3ee); transition:width 0.3s ease;
    }
    .nav-link:hover::after { width:100%; }

    /* Video card */
    .vid-card {
      border-radius:20px; overflow:hidden;
      background:rgba(255,255,255,0.03);
      border:1px solid rgba(255,255,255,0.07);
      transition:transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
      cursor:pointer;
    }
    .vid-card:hover {
      transform:translateY(-5px);
      border-color:rgba(167,139,250,0.3);
      box-shadow:0 8px 40px rgba(124,58,237,0.2);
    }
    .vid-card:hover .thumb-overlay { opacity:1; }
    .vid-card:hover .play-btn { transform:scale(1.1); }

    .thumb-overlay {
      position:absolute; inset:0;
      background:linear-gradient(to top,rgba(0,0,0,0.7) 0%,transparent 60%);
      opacity:0;
      transition:opacity 0.25s ease;
    }
    .play-btn {
      width:44px; height:44px; border-radius:50%;
      background:rgba(255,255,255,0.15);
      backdrop-filter:blur(8px);
      border:1px solid rgba(255,255,255,0.25);
      display:flex; align-items:center; justify-content:center;
      transition:transform 0.2s ease;
    }

    .tag {
      display:inline-block; padding:3px 10px; border-radius:999px;
      font-size:0.7rem; font-weight:500;
      background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.08); color:rgba(255,255,255,0.5);
    }
    .tag-violet { background:rgba(124,58,237,0.15); border-color:rgba(124,58,237,0.3); color:#a78bfa; }
    .tag-cyan   { background:rgba(6,182,212,0.12);  border-color:rgba(6,182,212,0.3);  color:#22d3ee; }
    .tag-pink   { background:rgba(236,72,153,0.12); border-color:rgba(236,72,153,0.3); color:#f472b6; }
    .tag-green  { background:rgba(16,185,129,0.12); border-color:rgba(16,185,129,0.3); color:#34d399; }
    .tag-orange { background:rgba(245,158,11,0.12); border-color:rgba(245,158,11,0.3); color:#fbbf24; }

    /* Filter chips */
    .filter-chip {
      padding:6px 16px; border-radius:999px; font-size:0.8rem; font-weight:500;
      border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.04);
      cursor:pointer; transition:all 0.2s ease; color:rgba(255,255,255,0.5);
      white-space:nowrap;
    }
    .filter-chip:hover { border-color:rgba(167,139,250,0.4); color:rgba(255,255,255,0.8); }
    .filter-chip.active {
      background:linear-gradient(135deg,rgba(124,58,237,0.25),rgba(6,182,212,0.15));
      border-color:rgba(124,58,237,0.5); color:#a78bfa;
    }

    /* Stats bar */
    .stat-bar {
      height:4px; border-radius:4px; background:rgba(255,255,255,0.08); overflow:hidden;
    }
    .stat-fill { height:100%; border-radius:4px; background:linear-gradient(90deg,#7c3aed,#22d3ee); }

    /* Stagger animation */
    .vid-card { opacity:0; }
    .vid-card.visible { animation:fade-up 0.5s ease forwards; }

    @keyframes shimmer {
      0%   { background-position:-200% 0; }
      100% { background-position: 200% 0; }

    /* Toast */
    #toast {
      position:fixed; bottom:24px; right:24px; z-index:100;
      background:rgba(16,185,129,0.15); border:1px solid rgba(16,185,129,0.3);
      backdrop-filter:blur(16px); border-radius:12px;
      padding:12px 20px; font-size:0.875rem; color:#34d399;
      opacity:0; transform:translateY(10px);
      transition:all 0.3s ease; pointer-events:none;
    }
    #toast.show { opacity:1; transform:translateY(0); }

    /* Search input */
    input[type=search] {
      background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1);
      border-radius:12px; color:#fff; font-family:'DM Sans',sans-serif;
      outline:none; padding:10px 16px 10px 40px; font-size:0.875rem;
      transition:border-color 0.2s ease, box-shadow 0.2s ease;
    }
    input[type=search]:focus {
      border-color:#7c3aed; box-shadow:0 0 0 3px rgba(124,58,237,0.15);
    }
    input[type=search]::placeholder { color:rgba(255,255,255,0.25); }

    /* More options menu */
    .more-menu {
      position:absolute; top:100%; right:0; z-index:50; min-width:150px;
      background:#111; border:1px solid rgba(255,255,255,0.1); border-radius:12px;
      padding:6px; display:none; margin-top:4px;
      box-shadow:0 8px 32px rgba(0,0,0,0.5);

      padding:8px 12px; border-radius:8px; font-size:0.8rem;

  function renderGrid(videos) {
    const grid = document.getElementById('videoGrid');
    const empty = document.getElementById('emptyState');

    if (!videos.length) {
      grid.innerHTML = '';
      empty.classList.remove('hidden');
      return;
    }
    empty.classList.add('hidden');

    grid.innerHTML = videos.map((v, i) => `
      <div class="vid-card" data-id="${v.id}" style="animation-delay:${i * 0.05}s">
        <!-- Thumbnail -->
        <div class="relative aspect-[9/14] bg-gradient-to-br ${v.gradient} flex items-center justify-center overflow-hidden">

          <!-- Platform icon -->
          <div class="absolute top-3 left-3 glass px-2 py-1 rounded-lg flex items-center gap-1.5">
            ${platformIcon(v.platform)}
            <span class="text-xs font-medium text-white/70">${v.duration}</span>
          </div>

          <!-- Status badge -->

              : `<span class="tag tag-orange text-xs">Draft</span>`}
          </div>

          <!-- Play overlay -->

          <div class="play-btn relative z-10">

            <div class="text-xs font-bold" style="color:${v.accent};font-family:Syne,sans-serif;text-shadow:0 0 8px ${v.accent}88">${v.score}/100</div>
            <div class="text-xs text-white/40">viral score</div>
          </div>
          ` : `
          <div class="absolute bottom-3 left-3">
            <div class="text-xs text-white/30">Ready to generate</div>
          </div>

          <div class="absolute bottom-3 right-3 flex items-end gap-0.5 h-5 opacity-60">
            ${[3,5,8,6,4,7,5,3,6,4].map((h,j)=>`<div style="width:2px;height:${h*2}px;border-radius:2px;background:linear-gradient(to top,${v.accent},rgba(255,255,255,0.5));animation:wave 1s ease-in-out infinite;animation-delay:${j*0.1}s"></div>`).join('')}

        <div class="p-4">
          <h3 class="font-semibold text-sm leading-snug mb-2 line-clamp-2">${v.title}</h3>

            <div class="text-center">
              <div class="text-sm font-bold" style="font-family:Syne,sans-serif">${v.likes}</div>
              <div class="text-xs text-white/30">likes</div>
            </div>
            <div class="text-center">
              <div class="text-sm font-bold" style="font-family:Syne,sans-serif">${v.shares}</div>
              <div class="text-xs text-white/30">shares</div>
            </div>
          </div>
          ` : `
          <div class="text-xs text-white/30 mb-3">${v.daysAgo === 0 ? 'Created today' : `Created ${v.daysAgo}d ago`}</div>
          `}

          <!-- Action row -->
          <div class="flex gap-2">
            ${v.status === 'published'
              ? `<button onclick="exportVideo(${v.id},event)" class="flex-1 grad-btn text-white text-xs font-semibold py-2 rounded-lg flex items-center justify-center gap-1.5">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                  Export
                </button>`
              : `<a href="create.html" class="flex-1 grad-btn text-white text-xs font-semibold py-2 rounded-lg flex items-center justify-center gap-1.5">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                  Generate
                </a>`}
            <button onclick="deleteVideo(${v.id},event)" class="glass text-red-400/70 hover:text-red-400 text-xs py-2 px-3 rounded-lg transition-colors border border-white/8 hover:border-red-500/30" title="Radera">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
            </button>
            <div class="relative">
              <button onclick="toggleMenu(${v.id},event)" class="glass text-white/50 hover:text-white text-xs py-2 px-3 rounded-lg transition-colors border border-white/8 hover:border-white/20">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>
              </button>
              <div id="menu-${v.id}" class="more-menu">
                <button onclick="copyCaption(${v.id},event)">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                  Copy caption
                </button>
                <button onclick="shareVideo(${v.id},event)">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
                  Share
                </button>
                <button onclick="duplicateVideo(${v.id},event)">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                  Duplicate
                </button>
                <button class="danger" onclick="deleteVideo(${v.id},event)">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
                  Delete
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    `).join('');

    // Observe for stagger animation
    document.querySelectorAll('.vid-card').forEach(el => {
      setTimeout(() => el.classList.add('visible'), 50);
    });
  }

  function platformIcon(p) {
    if (p === 'tiktok') return `<svg width="10" height="12" viewBox="0 0 24 24" fill="white"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.18 8.18 0 0 0 4.78 1.52V6.76a4.85 4.85 0 0 1-1.01-.07z"/></svg>`;
    if (p === 'youtube') return `<svg width="12" height="9" viewBox="0 0 22 16" fill="#FF0000"><path d="M21.54 2.5A2.77 2.77 0 0 0 19.58.5C17.88 0 11 0 11 0S4.12 0 2.42.5A2.77 2.77 0 0 0 .46 2.5C0 4.22 0 8 0 8s0 3.78.46 5.5A2.77 2.77 0 0 0 2.42 15.5C4.12 16 11 16 11 16s6.88 0 8.58-.5a2.77 2.77 0 0 0 1.96-2C22 11.78 22 8 22 8s0-3.78-.46-5.5zM8.75 11.5v-7L14.5 8l-5.75 3.5z"/></svg>`;
    return `<svg width="11" height="11" viewBox="0 0 24 24" fill="url(#igG3)"><defs><linearGradient id="igG3" x1="0%" y1="100%" x2="100%" y2="0%"><stop offset="0%" stop-color="#FFDC80"/><stop offset="50%" stop-color="#E1306C"/><stop offset="100%" stop-color="#833AB4"/></linearGradient></defs><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>`;
  }

  function getFiltered() {
    return VIDEOS.filter(v => {
      const matchFilter = activeFilter === 'all'
        || v.platform === activeFilter
        || v.status === activeFilter;
      const matchSearch = !searchQuery
        || v.title.toLowerCase().includes(searchQuery.toLowerCase());
      return matchFilter && matchSearch;
    });
  }

  function setFilter(el, filter) {
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    activeFilter = filter;
    renderGrid(getFiltered());
  }

  function filterVideos(q) {
    searchQuery = q;
    renderGrid(getFiltered());
  }

  function resetFilters() {
    activeFilter = 'all';
    searchQuery  = '';
    document.querySelectorAll('.filter-chip').forEach((c,i) => { if(i===0) c.classList.add('active'); else c.classList.remove('active'); });
    document.querySelector('input[type=search]').value = '';
    renderGrid(getFiltered());
  }

  // ── Context menus ──
  function toggleMenu(id, e) {
    e.stopPropagation();
    const menu = document.getElementById('menu-' + id);
    if (openMenu && openMenu !== menu) openMenu.classList.remove('open');
    menu.classList.toggle('open');
    openMenu = menu.classList.contains('open') ? menu : null;
  }

  document.addEventListener('click', () => {
    if (openMenu) { openMenu.classList.remove('open'); openMenu = null; }
  });

  function exportVideo(id, e) {
    e.stopPropagation();
    const btn = e.currentTarget;
    const orig = btn.innerHTML;
    btn.innerHTML = '✓ Exported!';
    btn.style.background = 'linear-gradient(135deg,#059669,#10b981)';
    setTimeout(() => { btn.innerHTML = orig; btn.style.background = ''; }, 2000);
  }

  function copyCaption(id, e) {
    e && e.stopPropagation();
    const v = VIDEOS.find(x => x.id === id);
    if (v && v.caption) {
      navigator.clipboard.writeText(v.caption).catch(()=>{});
      showToast('Caption copied to clipboard!');
    } else {
      showToast('No caption yet — generate the video first');
    }
    if (openMenu) { openMenu.classList.remove('open'); openMenu = null; }
  }

  function shareVideo(id, e) {
    e && e.stopPropagation();
    showToast('Share link copied!');
    if (openMenu) { openMenu.classList.remove('open'); openMenu = null; }
  }

  function duplicateVideo(id, e) {
    e && e.stopPropagation();
    showToast('Video duplicated as draft');
    if (openMenu) { openMenu.classList.remove('open'); openMenu = null; }
  }

  function deleteVideo(id, e) {
    e && e.stopPropagation();

    // Ta bort från localStorage om det är en sparad video
    const saved = JSON.parse(localStorage.getItem('viralai_videos') || '[]');
    const filtered = saved.filter(v => v.id !== id);
    localStorage.setItem('viralai_videos', JSON.stringify(filtered));

    // Ta bort kortet från skärmen med animation
    const card = document.querySelector(`[data-id="${id}"]`);
    if (card) {
      card.style.transition = 'opacity 0.3s, transform 0.3s';
      card.style.opacity = '0';
      card.style.transform = 'scale(0.9)';
      setTimeout(() => card.remove(), 300);
    }
    showToast('Video raderad');
    if (openMenu) { openMenu.classList.remove('open'); openMenu = null; }
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = '✓ ' + msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 2500);
  }

  // Lägg till videos från localStorage (skapade av användaren) överst
  function loadUserVideos() {
    const saved = JSON.parse(localStorage.getItem('viralai_videos') || '[]');
    saved.forEach((v, i) => {
      // Fyll i saknade fält med defaults
      if (!v.gradient) v.gradient = 'from-violet-900 to-cyan-900';
      if (!v.accent)   v.accent   = '#7c3aed';
      VIDEOS.unshift(v);
    });
  }
  loadUserVideos();

  // Initial render
  renderGrid(VIDEOS);

  // Wave animation keyframe
  const style = document.createElement('style');
  style.textContent = `@keyframes wave { 0%,100%{transform:scaleY(0.3)} 50%{transform:scaleY(1)} }`;
  document.head.appendChild(style);
</script>
</body>
</html>
