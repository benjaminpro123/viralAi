<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ViralAI – Create Your Video</title>
  <meta name="description" content="Describe your video and let AI create it instantly." />
  <meta name="theme-color" content="#7c3aed" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%237c3aed'/><text y='.9em' font-size='70' x='15'>V</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    body { background:#000; font-family:'DM Sans',sans-serif; color:#fff; overflow-x:hidden; }
    h1,h2 { font-family:'Syne',sans-serif; }

    .glass {
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.08);
      backdrop-filter:blur(20px);
    }
    .grad-text {
      background:linear-gradient(135deg,#a78bfa,#22d3ee);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }
    .grad-btn {
      background:linear-gradient(135deg,#7c3aed,#06b6d4);
      transition:transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    }
    .grad-btn:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 0 32px rgba(139,92,246,0.5); }
    .grad-btn:disabled { opacity:0.5; cursor:not-allowed; }

    .orb { position:fixed; border-radius:50%; filter:blur(100px); pointer-events:none; z-index:0; }

    textarea {
      background:rgba(255,255,255,0.04);
      border:1.5px solid rgba(255,255,255,0.1);
      border-radius:16px; color:#fff;
      font-family:'DM Sans',sans-serif; font-size:1rem;
      outline:none; resize:none; width:100%;
      transition:border-color 0.25s, box-shadow 0.25s;
    }
    textarea:focus {
      border-color:#7c3aed;
      box-shadow:0 0 0 4px rgba(124,58,237,0.12);
    }
    textarea::placeholder { color:rgba(255,255,255,0.2); }

    /* Loading dots */
    @keyframes dot { 0%,80%,100%{transform:scale(0);opacity:0} 40%{transform:scale(1);opacity:1} }
    .dot { width:8px; height:8px; border-radius:50%; background:#a78bfa; animation:dot 1.4s ease-in-out infinite; }
    .dot:nth-child(2) { animation-delay:0.16s; }
    .dot:nth-child(3) { animation-delay:0.32s; }

    /* Fade in */
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    .fade-up { animation:fadeUp 0.5s ease forwards; }

    /* Video result */
    #resultBox { display:none; }
    #resultBox.show { display:block; animation:fadeUp 0.5s ease forwards; }

    /* Suggestion chips */
    .chip {
      padding:6px 14px; border-radius:999px; font-size:0.8rem;
      border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.04);
      cursor:pointer; transition:all 0.2s ease; color:rgba(255,255,255,0.55);
      white-space:nowrap;
    }
    .chip:hover { border-color:rgba(167,139,250,0.5); color:#fff; background:rgba(124,58,237,0.1); }

    nav a { font-family:'DM Sans',sans-serif; }
    .nav-link { position:relative; }
    .nav-link::after {
      content:''; position:absolute; bottom:-2px; left:0; width:0; height:2px;
      background:linear-gradient(90deg,#a78bfa,#22d3ee); transition:width 0.3s ease;
    }
    .nav-link:hover::after { width:100%; }
  </style>
</head>
<body>

<!-- BG Orbs -->
<div class="orb" style="width:600px;height:600px;background:radial-gradient(circle,#7c3aed,transparent 70%);opacity:0.2;top:-150px;left:-150px;"></div>
<div class="orb" style="width:500px;height:500px;background:radial-gradient(circle,#06b6d4,transparent 70%);opacity:0.15;bottom:-100px;right:-100px;"></div>
<div class="fixed inset-0 pointer-events-none" style="background-image:linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px);background-size:60px 60px;z-index:0"></div>

<!-- NAV -->
<nav class="fixed top-0 left-0 right-0 z-50 glass border-b border-white/5">
  <div class="max-w-5xl mx-auto px-6 h-16 flex items-center justify-between">
    <a href="index.html" class="flex items-center gap-2">
      <div class="w-8 h-8 rounded-lg grad-btn flex items-center justify-center text-white font-bold text-sm" style="font-family:Syne,sans-serif">V</div>
      <span class="font-bold text-lg grad-text" style="font-family:Syne,sans-serif">ViralAI</span>
    </a>
    <div class="hidden md:flex items-center gap-8">
      <a href="index.html"  class="nav-link text-white/60 hover:text-white text-sm transition-colors">Home</a>
      <a href="create.html" class="nav-link text-white text-sm">Create</a>
    </div>
    <a href="index.html" class="glass text-white/60 hover:text-white text-sm px-4 py-2 rounded-full border border-white/10 hover:border-white/20 transition-all">
      Home
    </a>
  </div>
</nav>

<!-- MAIN -->
<main class="relative z-10 min-h-screen flex flex-col items-center justify-center px-6 pt-24 pb-20">
  <div class="w-full max-w-2xl">

    <!-- Header -->
    <div class="text-center mb-10 fade-up">
      <h1 class="text-4xl sm:text-6xl font-extrabold mb-4">
        Describe your<br/><span class="grad-text">AI video</span>
      </h1>
      <p class="text-white/50 text-lg">Tell us what you want — we'll create it instantly.</p>
    </div>

    <!-- Input area -->
    <div class="fade-up" style="animation-delay:0.1s;opacity:0">
      <textarea
        id="promptInput"
        rows="4"
        placeholder="e.g. A cinematic video of a person meditating at sunrise on a mountain, calm and peaceful…"
        class="px-5 py-4 mb-4 text-base"
      ></textarea>

      <!-- Suggestion chips -->
      <div class="flex flex-wrap gap-2 mb-6">
        <span class="text-xs text-white/30 self-center">Try:</span>
        <button class="chip" onclick="setPrompt('A person running through a neon-lit city at night, energetic and fast')">🌆 Night city run</button>
        <button class="chip" onclick="setPrompt('Peaceful ocean waves at golden hour, slow motion, cinematic')">🌊 Ocean waves</button>
        <button class="chip" onclick="setPrompt('Someone cooking a delicious meal in a modern kitchen, close-up shots')">🍳 Cooking video</button>
        <button class="chip" onclick="setPrompt('A motivational gym workout montage, intense and powerful')">💪 Gym motivation</button>
        <button class="chip" onclick="setPrompt('Aerial drone footage of a green forest with fog, mystical atmosphere')">🌲 Forest drone</button>
      </div>

      <!-- Generate button -->
      <button id="generateBtn" onclick="generate()" class="grad-btn w-full text-white font-bold py-4 rounded-2xl text-lg flex items-center justify-center gap-3">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Generate Video
      </button>
    </div>

    <!-- Loading state -->
    <div id="loadingBox" class="hidden text-center mt-12">
      <div class="flex justify-center gap-2 mb-4">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
      <p class="text-white/50 text-sm" id="loadingLabel">Finding the perfect video…</p>
    </div>

    <!-- Result -->
    <div id="resultBox" class="mt-10">
      <div class="glass rounded-3xl overflow-hidden border border-violet-500/20" style="box-shadow:0 0 60px rgba(124,58,237,0.15)">

        <!-- Video player -->
        <div class="relative bg-black" style="aspect-ratio:9/16;max-height:70vh;overflow:hidden">
          <video id="resultVideo" autoplay muted loop playsinline
            style="width:100%;height:100%;object-fit:cover;">
          </video>
          <!-- Gradient overlay bottom -->
          <div class="absolute bottom-0 left-0 right-0 h-24" style="background:linear-gradient(to top,rgba(0,0,0,0.6),transparent)"></div>
          <!-- Badge -->
          <div class="absolute top-4 left-4 glass px-3 py-1 rounded-full text-xs text-white/70 flex items-center gap-2">
            <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse inline-block"></span>
            AI Generated
          </div>
        </div>

        <!-- Actions -->
        <div class="p-6 flex flex-col gap-3">
          <p class="text-white/50 text-sm text-center" id="resultPromptLabel"></p>
          <div class="flex gap-3">
            <button onclick="regenerate()" class="glass text-white/70 hover:text-white font-semibold py-3 px-4 rounded-xl text-sm border border-white/10 hover:border-violet-500/40 transition-all flex items-center justify-center gap-2">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
              New
            </button>
            <button onclick="downloadVideo()" id="downloadBtn" class="flex-1 grad-btn text-white font-semibold py-3 rounded-xl text-sm flex items-center justify-center gap-2">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              Ladda ner video
            </button>
          </div>
          <button onclick="createNew()" class="text-white/30 hover:text-white/60 text-sm transition-colors">
            ← Start over
          </button>
        </div>
      </div>
    </div>

  </div>
</main>

<script>
  const PEXELS_API_KEY = 'qR5KMsVNxwK926d1Brq0SCEY2LBlyhn7uWJkVxSS7A6taALSedlK0sO1';

  let currentVideoUrl = '';
  let currentPrompt   = '';

  const loadingMessages = [
    'Finding the perfect video…',
    'Analysing your description…',
    'Searching visual library…',
    'Matching your vision…',
    'Almost ready…',
  ];
  let loadingTimer = null;

  function setPrompt(text) {
    document.getElementById('promptInput').value = text;
    document.getElementById('promptInput').focus();
  }

  async function fetchVideo(query) {
    const res = await fetch(
      `https://api.pexels.com/videos/search?query=${encodeURIComponent(query)}&per_page=10&orientation=portrait`,
      { headers: { Authorization: PEXELS_API_KEY } }
    );
    const data = await res.json();
    if (!data.videos || !data.videos.length) return null;
    // Pick a random video from top 10 results
    const video = data.videos[Math.floor(Math.random() * data.videos.length)];
    const file  = video.video_files.find(f => f.width <= 720 && f.height >= 720)
               || video.video_files.find(f => f.quality === 'sd')
               || video.video_files[0];
    return file ? file.link : null;
  }

  async function generate() {
    const prompt = document.getElementById('promptInput').value.trim();
    if (!prompt) {
      document.getElementById('promptInput').style.borderColor = '#ef4444';
      document.getElementById('promptInput').focus();
      setTimeout(() => document.getElementById('promptInput').style.borderColor = '', 1500);
      return;
    }
    currentPrompt = prompt;
    showLoading(true);

    try {
      const url = await fetchVideo(prompt);
      if (url) {
        currentVideoUrl = url;
        showResult(url, prompt);
      } else {
        showLoading(false);
        alert('No video found for that description. Try different words!');
      }
    } catch (e) {
      showLoading(false);
      alert('Something went wrong. Check your internet connection and try again.');
    }
  }

  async function regenerate() {
    showLoading(true);
    document.getElementById('resultBox').classList.remove('show');
    try {
      const url = await fetchVideo(currentPrompt);
      if (url) { currentVideoUrl = url; showResult(url, currentPrompt); }
      else { showLoading(false); }
    } catch(e) { showLoading(false); }
  }

  function showLoading(on) {
    const btn  = document.getElementById('generateBtn');
    const load = document.getElementById('loadingBox');
    btn.disabled = on;
    load.classList.toggle('hidden', !on);
    if (on) {
      let idx = 0;
      loadingTimer = setInterval(() => {
        document.getElementById('loadingLabel').textContent = loadingMessages[idx % loadingMessages.length];
        idx++;
      }, 900);
    } else {
      clearInterval(loadingTimer);
    }
  }

  function showResult(url, prompt) {
    showLoading(false);
    document.getElementById('resultVideo').src = url;
    document.getElementById('resultPromptLabel').textContent = `"${prompt.length > 80 ? prompt.slice(0,80)+'…' : prompt}"`;
    const box = document.getElementById('resultBox');
    box.classList.add('show');
    box.scrollIntoView({ behavior:'smooth', block:'start' });
  }

  function saveAndView() {
    const saved = JSON.parse(localStorage.getItem('viralai_videos') || '[]');
    saved.unshift({
      id: Date.now(),
      title: currentPrompt.length > 60 ? currentPrompt.slice(0,60)+'…' : currentPrompt,
      platform: 'tiktok',
      duration: '30s',
      style: 'AI Generated',
      voice: '—',
      videoUrl: currentVideoUrl,
      views:'0', likes:'0', comments:'0', shares:'0',
      score: Math.floor(Math.random()*15+82),
      status: 'published',
      caption: currentPrompt + ' #viral #ai #fyp',
      daysAgo: 0,
      gradient: 'from-violet-900 to-cyan-900',
      accent: '#7c3aed',
    });
    localStorage.setItem('viralai_videos', JSON.stringify(saved));
    window.location.href = 'videos.html';
  }

  async function downloadVideo() {
    const btn = document.getElementById('downloadBtn');
    const orig = btn.innerHTML;
    btn.innerHTML = '<svg class="animate-spin" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> Laddar ner…';
    btn.disabled = true;

    try {
      const res  = await fetch(currentVideoUrl);
      const blob = await res.blob();
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href     = url;
      a.download = 'viralai-video.mp4';
      a.click();
      URL.revokeObjectURL(url);
      btn.innerHTML = '✓ Nedladdad!';
      btn.style.background = 'linear-gradient(135deg,#059669,#10b981)';
      setTimeout(() => {
        btn.innerHTML = orig;
        btn.style.background = '';
        btn.disabled = false;
      }, 2500);
    } catch (e) {
      // Fallback: öppna i ny flik så användaren kan spara manuellt
      window.open(currentVideoUrl, '_blank');
      btn.innerHTML = orig;
      btn.disabled = false;
    }
  }

  function createNew() {
    document.getElementById('resultBox').classList.remove('show');
    document.getElementById('promptInput').value = '';
    document.getElementById('promptInput').focus();
    window.scrollTo({ top:0, behavior:'smooth' });
  }
</script>
</body>
</html>
